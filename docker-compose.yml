version: '3.8'

services:
  gmail-triage:
    build: .
    container_name: gmail-triage-agent
    restart: unless-stopped
    environment:
      - DB_PATH=/app/app_data.db
      - TZ=UTC # Adjust timezone if necessary
    volumes:
      # Map the database so its persisted on your machine
      - ./app_data.db:/app/app_data.db
      # Map logs for easy access
      - ./logs:/app/logs
      # Bind secrets in read-only mode so the container cannot modify them
      - ./token.json:/app/token.json:ro
      - ./credentials.json:/app/credentials.json:ro
      - ./.env:/app/.env:ro
